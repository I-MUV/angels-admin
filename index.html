// ── COBERTURA POB v2 (D3 + GeoJSON real) ──────────────────────────
function CoberturaPOBPage({data}){
  const {clients,orders}=data;
  const [pobMode,setPobMode]=React.useState("clientes");
  const [pobSelected,setPobSelected]=React.useState(null);
  const mapRef=React.useRef(null);
  const d3Ready=React.useRef(false);
  const zoomRef=React.useRef(null);
  const svgRef=React.useRef(null);
  const pathsRef=React.useRef(null);
  const [zoomPct,setZoomPct]=React.useState(100);
  const [activeZona,setActiveZona]=React.useState(null);
  const [rankingList,setRankingList]=React.useState([]);
  const [zonaList,setZonaList]=React.useState([]);

  const ZONA_COLORS={oriente:"#0d9488",norte:"#7c3aed",sur:"#d97706",poniente:"#2563eb",centro:"#0f766e"};
  const ZONA_LIGHT={oriente:"#99f6e4",norte:"#ddd6fe",sur:"#fde68a",poniente:"#bfdbfe",centro:"#5eead4"};
  const PERIFERICOS=new Set(["Colina","Lampa","Pirque","Paine","Buin","San José de Maipo","Padre Hurtado","Calera de Tango"]);
  const ZONAS_ORDER=["oriente","norte","sur","poniente","centro"];
  const fmtK=n=>n>=1000000?`$${(n/1000000).toFixed(1)}M`:n>=1000?`$${Math.round(n/1000)}k`:`$${Math.round(n||0).toLocaleString("es-CL")}`;

  // Build stats from Firebase data
  const comunaStats=React.useMemo(()=>{
    const stats={};
    clients.filter(c=>c.role==="client").forEach(c=>{
      const cm=c.clientProfile?.ciudad||c.ciudad||null;
      if(!cm) return;
      if(!stats[cm]) stats[cm]={clientes:0,servicios:0,ingresos:0};
      stats[cm].clientes++;
    });
    orders.forEach(o=>{
      const cm=o.ciudad||o.clientCity||null;
      if(!cm||!stats[cm]) return;
      stats[cm].servicios++;
      stats[cm].ingresos+=(o.finalPrice||0);
    });
    return stats;
  },[clients,orders]);

  // KPI values
  const totalClientes=clients.filter(c=>c.role==="client").length;
  const comunasActivas=Object.values(comunaStats).filter(s=>s.clientes>0).length;

  function getMetric(name,mode){
    const s=comunaStats[name];
    if(!s) return 0;
    return s[mode]||0;
  }

  function getZona(geoFeatures,name){
    const f=geoFeatures.find(f=>f.properties.Comuna===name);
    return f?.properties.zona||"sur";
  }

  function interpolateColor(c1,c2,t){
    const r=(h,i)=>parseInt(h.replace("#","").slice(i,i+2),16);
    const r1=r(c1,0),g1=r(c1,2),b1=r(c1,4);
    const r2=r(c2,0),g2=r(c2,2),b2=r(c2,4);
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  function getFill(name,mode,features){
    if(PERIFERICOS.has(name)){const isDark=document.documentElement.getAttribute("data-theme")==="dark";return isDark?"#374151":"#d1d5db";}
    const zona=getZona(features,name);
    const base=ZONA_COLORS[zona]||"#0d9488";
    const light=ZONA_LIGHT[zona]||"#5eead4";
    const s=comunaStats[name];
    // Always show zone color; data adds intensity on top
    if(!s||!s[mode]) return interpolateColor(light,base,0.45);
    const vals=Object.values(comunaStats).map(x=>x[mode]||0);
    const mx=Math.max(...vals,1);
    return interpolateColor(light,base,0.5+0.5*(s[mode]/mx));
  }

  // Build ranking
  function buildRanking(features,mode){
    const all=features
      .filter(f=>!PERIFERICOS.has(f.properties.Comuna))
      .map(f=>({
        name:f.properties.Comuna,
        value:getMetric(f.properties.Comuna,mode),
        zona:f.properties.zona||"sur"
      }))
      .filter(x=>x.value>0)
      .sort((a,b)=>b.value-a.value)
      .slice(0,12);
    setRankingList(all);
  }

  function buildZonas(features){
    const zt={};let tot=0;
    features.forEach(f=>{
      if(PERIFERICOS.has(f.properties.Comuna)) return;
      const zona=f.properties.zona||"sur";
      const v=getMetric(f.properties.Comuna,"clientes");
      zt[zona]=(zt[zona]||0)+v;
      tot+=v;
    });
    const sorted=Object.entries(zt).sort((a,b)=>b[1]-a[1]);
    setZonaList(sorted.map(([zona,v])=>({zona,v,pct:tot?Math.round((v/tot)*100):0})));
  }

  // ── D3 INIT ────────────────────────────────────────────────────
  React.useEffect(()=>{
    if(!mapRef.current||d3Ready.current) return;
    if(typeof d3==="undefined") return; // D3 not loaded yet

    const container=mapRef.current;

    fetch("./Region_Metropolitana.geojson")
      .then(r=>r.json())
      .then(GEO=>{
        d3Ready.current=true;
        const W=container.clientWidth||600;
        const H=container.clientHeight||450;

        const svg=d3.select(container).append("svg")
          .attr("width",W).attr("height",H)
          .style("display","block");
        svgRef.current=svg;

        const defs=svg.append("defs");
        defs.append("filter").attr("id","pob-txt-shadow")
          .html(`<feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="rgba(255,255,255,0.8)" flood-opacity="1"/>`);

        const projection=d3.geoMercator().fitSize([W,H],GEO);
        const pathGen=d3.geoPath().projection(projection);

        const g=svg.append("g").attr("id","pob-map-g");

        // Zoom
        const zoom=d3.zoom().scaleExtent([0.5,14]).on("zoom",e=>{
          g.attr("transform",e.transform);
          setZoomPct(Math.round(e.transform.k*100));
          // Label visibility
          g.selectAll(".lbl-name").each(function(d){
            const area=pathGen.area(d);
            const k=e.transform.k;
            d3.select(this)
              .attr("opacity",area>(300/(k*k))?1:0)
              .attr("font-size",`${Math.min(4.5,Math.max(2.5,4/k*Math.min(k,3)))}px`);
          });
          g.selectAll(".lbl-val").each(function(d){
            const area=pathGen.area(d);
            const k=e.transform.k;
            d3.select(this)
              .attr("opacity",area>(500/(k*k))?1:0)
              .attr("font-size",`${Math.min(5,Math.max(2.5,4.5/k*Math.min(k,3)))}px`);
          });
        });
        zoomRef.current=zoom;
        svg.call(zoom);

        function fitMap(){
          const bounds=pathGen.bounds(GEO);
          const bw=bounds[1][0]-bounds[0][0],bh=bounds[1][1]-bounds[0][1];
          const scale=0.86*Math.min(W/bw,H/bh);
          const tx=(W-scale*bw)/2-scale*bounds[0][0];
          const ty=(H-scale*bh)/2-scale*bounds[0][1];
          svg.call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
        }

        // Paths
        const modeRef={current:"clientes"};
        const selectedRef={current:null};

        const paths=g.selectAll(".comuna-path")
          .data(GEO.features).enter()
          .append("path")
          .attr("class",d=>PERIFERICOS.has(d.properties.Comuna)?"comuna-path periferico":"comuna-path")
          .attr("d",pathGen)
          .attr("fill",d=>getFill(d.properties.Comuna,modeRef.current,GEO.features))
          .on("mousemove",function(event,d){
            const tip=document.getElementById("pob-tooltip");
            if(!tip) return;
            const name=d.properties.Comuna;
            const s=comunaStats[name]||{clientes:0,servicios:0,ingresos:0};
            tip.querySelector(".ptt-name").textContent=name;
            tip.querySelector("#ptt-c").textContent=s.clientes||"—";
            tip.querySelector("#ptt-s").textContent=s.servicios||"—";
            tip.querySelector("#ptt-i").textContent=s.ingresos?fmtK(s.ingresos):"—";
            tip.style.display="block";
            tip.style.left=(event.clientX+14)+"px";
            tip.style.top=(event.clientY-10)+"px";
          })
          .on("mouseleave",()=>{
            const tip=document.getElementById("pob-tooltip");
            if(tip) tip.style.display="none";
          })
          .on("click",function(event,d){
            event.stopPropagation();
            const name=d.properties.Comuna;
            const newSel=selectedRef.current===name?null:name;
            selectedRef.current=newSel;
            setPobSelected(newSel);
            paths.classed("selected",x=>x.properties.Comuna===newSel);
          });
        pathsRef.current={paths,pathGen,GEO,modeRef,selectedRef,W,H,zoom,svg,g,fitMap};
        svg.on("click",e=>{if(e.target===svg.node()){selectedRef.current=null;setPobSelected(null);paths.classed("selected",false);fitMap();}});

        // Labels
        const labelG=g.selectAll(".lbl-g")
          .data(GEO.features).enter()
          .append("g")
          .attr("class","lbl-g")
          .attr("transform",d=>{const c=pathGen.centroid(d);return`translate(${c[0]},${c[1]})`;})
          .style("pointer-events","none");

        labelG.append("text")
          .attr("class",d=>"lbl-name"+(PERIFERICOS.has(d.properties.Comuna)?" periferico":""))
          .attr("y",-3.5)
          .attr("font-size","4px")
          .attr("filter","url(#pob-txt-shadow)")
          .text(d=>d.properties.Comuna);

        labelG.append("text")
          .attr("class","lbl-val")
          .attr("y",4)
          .attr("font-size","4.5px")
          .attr("filter","url(#pob-txt-shadow)")
          .attr("fill",d=>PERIFERICOS.has(d.properties.Comuna)?"#6b7280":"#1e293b")
          .text(d=>{
            const s=comunaStats[d.properties.Comuna];
            if(!s||PERIFERICOS.has(d.properties.Comuna)) return "";
            return "clientes"==="ingresos"?fmtK(s.clientes):s.clientes;
          });

        fitMap();
        buildRanking(GEO.features,"clientes");
        buildZonas(GEO.features);

        // Expose update function to window for button handlers
        window._pobUpdate=(mode)=>{
          modeRef.current=mode;
          paths.attr("fill",d=>getFill(d.properties.Comuna,mode,GEO.features));
          g.selectAll(".lbl-val").text(d=>{
            const s=comunaStats[d.properties.Comuna];
            if(!s||PERIFERICOS.has(d.properties.Comuna)) return "";
            return mode==="ingresos"?fmtK(s[mode]):s[mode];
          });
          buildRanking(GEO.features,mode);
        };
        window._pobZoomIn=()=>svg.transition().duration(280).call(zoom.scaleBy,1.5);
        window._pobZoomOut=()=>svg.transition().duration(280).call(zoom.scaleBy,0.67);
        window._pobReset=()=>{selectedRef.current=null;setPobSelected(null);paths.classed("selected",false);fitMap();};
        window._pobSelectComuna=(name)=>{
          const feat=GEO.features.find(f=>f.properties.Comuna===name);
          if(!feat) return;
          const newSel=selectedRef.current===name?null:name;
          selectedRef.current=newSel;
          setPobSelected(newSel);
          paths.classed("selected",x=>x.properties.Comuna===newSel);
          if(newSel){
            const bounds=pathGen.bounds(feat);
            const bw=bounds[1][0]-bounds[0][0],bh=bounds[1][1]-bounds[0][1];
            const scale=Math.min(10,0.7*Math.min(W/Math.max(bw,8),H/Math.max(bh,8)));
            const cx=(bounds[0][0]+bounds[1][0])/2,cy=(bounds[0][1]+bounds[1][1])/2;
            svg.transition().duration(480).call(zoom.transform,
              d3.zoomIdentity.translate(W/2,H/2).scale(scale).translate(-cx,-cy));
          }
        };
        window._pobFilterZona=(zona)=>{
          paths.attr("opacity",d=>{
            if(!zona) return 1;
            const z=d.properties.zona||(PERIFERICOS.has(d.properties.Comuna)?"periferico":"sur");
            return z===zona?1:0.15;
          });
        };

        // Resize
        const ro=new ResizeObserver(()=>{
          const nw=container.clientWidth,nh=container.clientHeight;
          svg.attr("width",nw).attr("height",nh);
          projection.fitSize([nw,nh],GEO);
          paths.attr("d",pathGen);
          g.selectAll(".lbl-g").attr("transform",d=>{const c=pathGen.centroid(d);return`translate(${c[0]},${c[1]})`;});
          fitMap();
        });
        ro.observe(container);
      })
      .catch(err=>console.error("GeoJSON load failed:",err));
  },[]);

  // Sync mode updates to D3
  React.useEffect(()=>{
    if(window._pobUpdate) window._pobUpdate(pobMode);
  },[pobMode,comunaStats]);

  const selectedStat=pobSelected?comunaStats[pobSelected]||{clientes:0,servicios:0,ingresos:0}:null;
  const maxRank=rankingList[0]?.value||1;
  const maxZona=zonaList[0]?.v||1;

  return(
    <>
      {/* KPIs */}
      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(4,1fr)"}}>
        <KPI label="Comunas activas"  value={comunasActivas}          color="teal"/>
        <KPI label="Clientes totales" value={totalClientes}            color="mint"/>
        <KPI label="Con datos POB"    value={Object.keys(comunaStats).length} color="gold"/>
        <KPI label="Cobertura GRM"    value="42 comunas"               color="purple"/>
      </div>

      <div className="pob-layout">
        {/* MAP COLUMN */}
        <div className="card">
          {/* Header */}
          <div className="pob-map-header">
            <div className="pob-filters">
              {["clientes","ingresos","servicios"].map(m=>(
                <button key={m} className={`pob-filter-btn${pobMode===m?" active":""}`}
                  onClick={()=>setPobMode(m)}>
                  {m==="clientes"?"👥":m==="ingresos"?"💰":"🧹"} {m.charAt(0).toUpperCase()+m.slice(1)}
                </button>
              ))}
            </div>
            <div className="pob-zoom-controls">
              <button className="pob-zoom-btn" onClick={()=>window._pobReset&&window._pobReset()} title="Reset">⊙</button>
              <button className="pob-zoom-btn" onClick={()=>window._pobZoomOut&&window._pobZoomOut()}>−</button>
              <span className="pob-zoom-label">{zoomPct}%</span>
              <button className="pob-zoom-btn" onClick={()=>window._pobZoomIn&&window._pobZoomIn()}>+</button>
            </div>
          </div>

          {/* Zone legend chips */}
          <div className="pob-legend-chips">
            {["oriente","norte","sur","poniente","centro"].map(zona=>(
              <div key={zona} className={`pob-legend-chip${activeZona===zona?" active":""}`}
                style={{background:ZONA_COLORS[zona]+"20",color:ZONA_COLORS[zona],borderColor:ZONA_COLORS[zona]+"44"}}
                onClick={()=>{
                  const nz=activeZona===zona?null:zona;
                  setActiveZona(nz);
                  if(window._pobFilterZona) window._pobFilterZona(nz);
                }}>
                <div style={{width:7,height:7,borderRadius:"50%",background:ZONA_COLORS[zona],flexShrink:0}}/>
                {zona}
              </div>
            ))}
            <div className="pob-legend-chip" style={{background:"#9ca3af20",color:"#6b7280",borderColor:"#9ca3af44"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#9ca3af",flexShrink:0}}/>
              periferia
            </div>
          </div>

          {/* Map container — D3 mounts here */}
          <div className="pob-map-wrap" ref={mapRef}>
            <div className="pob-zoom-hint">🖱 Scroll · Arrastra · Clic para detalle</div>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className="pob-panel">
          {/* Detail card */}
          {pobSelected&&selectedStat?(
            <div className="card">
              <div className="card-title">
                📍 {pobSelected}
                <button className="modal-close" onClick={()=>{setPobSelected(null);if(window._pobReset)window._pobReset();}}>✕</button>
              </div>
              <div className="pob-stat-grid">
                <div className="pob-stat-box"><div className="pob-stat-val" style={{color:"var(--teal)"}}>{selectedStat.clientes}</div><div className="pob-stat-lbl">Clientes</div></div>
                <div className="pob-stat-box"><div className="pob-stat-val" style={{color:"var(--mint)"}}>{selectedStat.servicios}</div><div className="pob-stat-lbl">Servicios</div></div>
                <div className="pob-stat-box"><div className="pob-stat-val" style={{color:"var(--gold)"}}>{fmtK(selectedStat.ingresos)}</div><div className="pob-stat-lbl">Ingresos</div></div>
                <div className="pob-stat-box"><div className="pob-stat-val" style={{color:"var(--purple)"}}>{selectedStat.servicios?fmtK(selectedStat.ingresos/selectedStat.servicios):"—"}</div><div className="pob-stat-lbl">Ticket prom.</div></div>
              </div>
            </div>
          ):(
            <div className="card"><div className="pob-placeholder">📍<br/>Clic en una comuna<br/>para ver su detalle</div></div>
          )}

          {/* Ranking */}
          <div className="card" style={{flex:1,overflowY:"auto",maxHeight:280}}>
            <div className="card-title">Ranking por {pobMode}</div>
            {rankingList.length===0?(
              <div style={{textAlign:"center",color:"var(--text3)",fontSize:11,padding:"16px 0"}}>Sin datos en Firebase aún</div>
            ):rankingList.map((c,i)=>(
              <div key={c.name} className="pob-rank-row" onClick={()=>window._pobSelectComuna&&window._pobSelectComuna(c.name)}>
                <span className="pob-rank-num">{i+1}</span>
                <div className="pob-rank-dot" style={{background:ZONA_COLORS[c.zona]||"#0d9488"}}/>
                <span className="pob-rank-name">{c.name}</span>
                <div className="pob-rank-bar-wrap"><div className="pob-rank-bar-fill" style={{width:`${Math.round((c.value/maxRank)*100)}%`,background:ZONA_COLORS[c.zona]}}/></div>
                <span className="pob-rank-val" style={{color:ZONA_COLORS[c.zona]}}>{pobMode==="ingresos"?fmtK(c.value):c.value}</span>
              </div>
            ))}
          </div>

          {/* Zonas */}
          <div className="card">
            <div className="card-title">Por zona</div>
            {zonaList.map(({zona,v,pct})=>(
              <div key={zona} className="pob-zona-row">
                <div className="pob-zona-dot" style={{background:ZONA_COLORS[zona]||"#0d9488"}}/>
                <span className="pob-zona-name">{zona}</span>
                <div className="pob-zona-bar-wrap"><div className="pob-zona-bar-fill" style={{width:`${Math.round((v/maxZona)*100)}%`,background:ZONA_COLORS[zona]}}/></div>
                <span className="pob-zona-pct">{pct}%</span>
              </div>
            ))}
            {zonaList.length===0&&<div style={{color:"var(--text3)",fontSize:11}}>Sin datos aún</div>}
          </div>
        </div>
      </div>

      {/* Global tooltip for map */}
      <div id="pob-tooltip">
        <div className="ptt-name"></div>
        <div className="ptt-row"><span className="ptt-label">Clientes</span><span className="ptt-value" id="ptt-c">—</span></div>
        <div className="ptt-row"><span className="ptt-label">Servicios</span><span className="ptt-value" id="ptt-s">—</span></div>
        <div className="ptt-row"><span className="ptt-label">Ingresos</span><span className="ptt-value" id="ptt-i">—</span></div>
      </div>
    </>
  );
}



function DashboardPage({data,onNewExpense}){
  const {clients,orders,gastos}=data;
  const now=new Date();
  const thisMonth=now.getMonth();
  const thisYear=now.getFullYear();

  const ordersThisMonth=orders.filter(o=>{
    const d=new Date(o.createdAt||o.date||0);
    return d.getMonth()===thisMonth&&d.getFullYear()===thisYear&&o.status!=="pending_payment"&&o.status!=="payment_failed";
  });
  const ingresos=ordersThisMonth.reduce((s,o)=>s+(o.finalPrice||0),0);
  const gastosTotal=gastos.reduce((s,g)=>s+(g.monto||0),0);
  const margen=ingresos-gastosTotal;
  const clientesActivos=clients.filter(c=>c.role==="client").length;

  // Ingresos por mes (6 meses)
  const barData=Array.from({length:6},(_,i)=>{
    const m=(thisMonth-5+i+12)%12;
    const y=thisMonth-5+i<0?thisYear-1:thisYear;
    const v=orders.filter(o=>{
      const d=new Date(o.createdAt||o.date||0);
      return d.getMonth()===m&&d.getFullYear()===y&&o.status!=="pending_payment"&&o.status!=="payment_failed";
    }).reduce((s,o)=>s+(o.finalPrice||0),0);
    return{label:MONTHS[m],v,active:i===5};
  });

  // Top clientes
  const clientSpend={};
  orders.forEach(o=>{if(o.clientId&&o.finalPrice)clientSpend[o.clientId]=(clientSpend[o.clientId]||0)+(o.finalPrice||0);});
  const topClients=clients.filter(c=>c.role==="client").map(c=>({...c,total:clientSpend[c.uid]||0})).sort((a,b)=>b.total-a.total).slice(0,5);

  // Distribución servicios
  const svcCount={};
  orders.forEach(o=>{if(o.name)svcCount[o.name]=(svcCount[o.name]||0)+1;});
  const topSvc=Object.entries(svcCount).sort((a,b)=>b[1]-a[1]).slice(0,4);
  const totalSvc=topSvc.reduce((s,x)=>s+x[1],0)||1;
  const SVCCOLORS=["#0d9488","#2dd4bf","#f59e0b","#8b5cf6"];

  // Comunas
  const comunaCount={};
  clients.filter(c=>c.role==="client").forEach(c=>{const cm=c.clientProfile?.ciudad||c.ciudad||"Sin datos";comunaCount[cm]=(comunaCount[cm]||0)+1;});
  const topComunas=Object.entries(comunaCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxComuna=Math.max(...topComunas.map(x=>x[1]),1);

  return(
    <>
      <div className="kpi-grid">
        <KPI label="Ingresos del mes" value={fmtK(ingresos)} sub={`${ordersThisMonth.length} servicios`} trend="up" color="teal"/>
        <KPI label="Clientes activos" value={clientesActivos} sub={`Total registrados`} trend="up" color="mint"/>
        <KPI label="Gastos acumulados" value={fmtK(gastosTotal)} sub={`${gastos.length} registros`} color="gold"/>
        <KPI label="Margen neto" value={fmtK(margen)} sub={ingresos>0?`${Math.round(margen/ingresos*100)}% margen`:"-"} trend={margen>0?"up":"down"} color={margen>0?"teal":"red"}/>
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">Ingresos mensuales <a>Ver detalle →</a></div>
          <BarChart data={barData}/>
        </div>
        <div className="card">
          <div className="card-title">Clientes destacados <a>Ver todos →</a></div>
          {topClients.length===0?<div className="loader" style={{height:80}}>Sin datos</div>:
          topClients.map((c,i)=>(
            <div className="client-row" key={i}>
              <div className="avatar-sm">{initials(c.name)}</div>
              <div style={{flex:1}}>
                <div className="client-name">{c.name||c.email}</div>
                <div className="client-meta">{c.clientProfile?.ciudad||"—"}</div>
              </div>
              {c.total>0&&<div className="client-amount">{fmtK(c.total)}</div>}
              {i===0&&<span className="badge badge-purple">VIP</span>}
              {i>0&&c.total>0&&<span className="badge badge-teal">Activo</span>}
            </div>
          ))}
        </div>
      </div>

      <div className="grid-3">
        <div className="card">
          <div className="card-title">Servicios más contratados</div>
          <div className="donut-wrap">
            <svg width="80" height="80" viewBox="0 0 80 80">
              {topSvc.reduce((acc,x,i)=>{
                const pct=x[1]/totalSvc;const circ=2*Math.PI*28;
                const dash=pct*circ;const offset=-(acc.offset);
                acc.els.push(<circle key={i} cx="40" cy="40" r="28" fill="none" stroke={SVCCOLORS[i]} strokeWidth="14" strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={offset} transform="rotate(-90 40 40)"/>);
                acc.offset+=dash;return acc;
              },{els:[],offset:0}).els}
              <circle cx="40" cy="40" r="21" fill="var(--card)"/>
              <text x="40" y="44" textAnchor="middle" fontSize="12" fontWeight="700" fill="var(--text)">{totalSvc}</text>
            </svg>
            <div className="legend">
              {topSvc.map((x,i)=>(
                <div className="legend-item" key={i}>
                  <div className="legend-dot" style={{background:SVCCOLORS[i]}}/>
                  <div className="legend-label" style={{fontSize:10}}>{x[0].replace("Limpieza ","")}</div>
                  <div className="legend-pct">{Math.round(x[1]/totalSvc*100)}%</div>
                </div>
              ))}
              {topSvc.length===0&&<div style={{fontSize:11,color:"var(--text3)"}}>Sin datos aún</div>}
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-title">Cobertura por comuna</div>
          {topComunas.length===0?<div style={{fontSize:11,color:"var(--text3)"}}>Sin datos</div>:
          topComunas.map(([c,n],i)=>(
            <div className="pob-commune" key={i}>
              <div style={{fontSize:11,color:"var(--text)",minWidth:90}}>{c}</div>
              <div className="pob-bar-wrap"><div className="pob-bar-fill" style={{width:`${n/maxComuna*100}%`}}/></div>
              <div className="pob-count">{n}</div>
            </div>
          ))}
        </div>

        <div className="card">
          <div className="card-title">Gastos recientes <a onClick={onNewExpense}>+ Agregar</a></div>
          {gastos.length===0?(
            <div className="scan-zone" onClick={onNewExpense}>
              <div className="scan-icon">📄</div>
              <div className="scan-text">Registra tu primera boleta<br/>o gasto de insumos</div>
            </div>
          ):gastos.slice(0,4).map((g,i)=>(
            <div className="expense-item" key={i}>
              <div className="expense-cat">
                <div className="expense-dot" style={{background:g.tipo==="insumo"?"#0d9488":g.tipo==="traslado"?"#f59e0b":"#8b5cf6"}}/>
                <div><div className="expense-name">{g.descripcion}</div><div className="expense-date">{g.fecha}</div></div>
              </div>
              <div className="expense-amount" style={{color:"#ef4444"}}>−{fmt(g.monto)}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function ClientesPage({data}){
  const {clients,orders}=data;
  const [search,setSearch]=useState("");
  const clientSpend={};
  orders.forEach(o=>{if(o.clientId)clientSpend[o.clientId]=(clientSpend[o.clientId]||0)+(o.finalPrice||0);});
  const clientOrders={};
  orders.forEach(o=>{if(o.clientId)clientOrders[o.clientId]=(clientOrders[o.clientId]||0)+1;});

  const rows=clients.filter(c=>c.role==="client").map(c=>({...c,total:clientSpend[c.uid]||0,servicios:clientOrders[c.uid]||0}))
    .filter(c=>!search||(c.name||c.email||"").toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>b.total-a.total);

  return(
    <>
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center"}}>
        <input className="form-input" style={{maxWidth:280}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar cliente..."/>
        <span style={{fontSize:12,color:"var(--text3)"}}>{rows.length} clientes</span>
      </div>
      <div className="card" style={{padding:0}}>
        <table className="data-table">
          <thead>
            <tr><th>Cliente</th><th>Email</th><th>Comuna</th><th>Servicios</th><th>Total gastado</th><th>Estado</th></tr>
          </thead>
          <tbody>
            {rows.length===0?<tr><td colSpan={6} style={{textAlign:"center",color:"var(--text3)",padding:24}}>Sin clientes registrados</td></tr>:
            rows.map((c,i)=>(
              <tr key={i}>
                <td><div style={{display:"flex",alignItems:"center",gap:8}}><div className="avatar-sm" style={{width:28,height:28,fontSize:10}}>{initials(c.name)}</div><div><div style={{fontWeight:600}}>{c.name||"—"}</div><div style={{fontSize:10,color:"var(--text3)"}}>{c.phone||""}</div></div></div></td>
                <td style={{color:"var(--text2)",fontSize:11}}>{c.email}</td>
                <td style={{fontSize:11}}>{c.clientProfile?.ciudad||c.ciudad||"—"}</td>
                <td><span className="badge badge-teal">{c.servicios}</span></td>
                <td style={{fontFamily:"DM Mono",fontWeight:700,color:"var(--teal)"}}>{c.total>0?fmtK(c.total):"—"}</td>
                <td><span className={`badge ${c.servicios>2?"badge-purple":c.servicios>0?"badge-green":"badge-gray"}`}>{c.servicios>2?"VIP":c.servicios>0?"Activo":"Nuevo"}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </>
  );
}

function GastosPage({data,onNewExpense}){
  const {gastos}=data;
  const total=gastos.reduce((s,g)=>s+(g.monto||0),0);
  const byTipo={};
  gastos.forEach(g=>{byTipo[g.tipo]=(byTipo[g.tipo]||0)+(g.monto||0);});

  return(
    <>
      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <KPI label="Total gastos" value={fmtK(total)} color="red"/>
        <KPI label="Boletas registradas" value={gastos.length} color="gold"/>
        <KPI label="Promedio por gasto" value={gastos.length?fmtK(total/gastos.length):"—"} color="mint"/>
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-title">Registro de boletas <a onClick={onNewExpense}>+ Nueva</a></div>
          {gastos.length===0?(
            <div className="scan-zone" onClick={onNewExpense}>
              <div className="scan-icon">📄</div>
              <div className="scan-text">Aún no hay gastos registrados.<br/>Haz clic para agregar tu primera boleta.</div>
            </div>
          ):<table className="data-table">
            <thead><tr><th>Descripción</th><th>Categoría</th><th>Proveedor</th><th>Fecha</th><th>Monto</th></tr></thead>
            <tbody>
              {gastos.map((g,i)=>(
                <tr key={i}>
                  <td>{g.descripcion}</td>
                  <td><span className="badge badge-gray">{g.tipo}</span></td>
                  <td style={{fontSize:11,color:"var(--text3)"}}>{g.proveedor||"—"}</td>
                  <td style={{fontFamily:"DM Mono",fontSize:11}}>{g.fecha}</td>
                  <td style={{fontFamily:"DM Mono",fontWeight:700,color:"#ef4444"}}>−{fmt(g.monto)}</td>
                </tr>
              ))}
            </tbody>
          </table>}
        </div>
        <div className="card">
          <div className="card-title">Por categoría</div>
          {Object.entries(byTipo).map(([tipo,monto],i)=>(
            <div className="expense-item" key={i}>
              <div className="expense-cat">
                <div className="expense-dot" style={{background:["#0d9488","#2dd4bf","#f59e0b","#8b5cf6","#ef4444","#94a3b8"][i%6]}}/>
                <div className="expense-name" style={{textTransform:"capitalize"}}>{tipo}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="expense-amount" style={{color:"#ef4444"}}>−{fmtK(monto)}</div>
                <div style={{fontSize:9,color:"var(--text3)"}}>{Math.round(monto/total*100)}% del total</div>
              </div>
            </div>
          ))}
          {Object.keys(byTipo).length===0&&<div style={{fontSize:11,color:"var(--text3)"}}>Sin gastos registrados</div>}
        </div>
      </div>
    </>
  );
}

function ExportPage({data}){
  const {clients,orders,gastos}=data;

  const exportCSV=(rows,filename)=>{
    if(!rows.length)return;
    const keys=Object.keys(rows[0]);
    const csv=[keys.join(","),...rows.map(r=>keys.map(k=>`"${(r[k]||"").toString().replace(/"/g,'""')}"`).join(","))].join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=filename;a.click();
  };

  const exportClientes=()=>exportCSV(
    clients.filter(c=>c.role==="client").map(c=>({nombre:c.name||"",email:c.email||"",telefono:c.phone||"",comuna:c.clientProfile?.ciudad||"",creado:c.createdAt||""})),
    "angels_clientes.csv");

  const exportOrdenes=()=>exportCSV(
    orders.map(o=>({servicio:o.name||"",cliente:o.clientName||"",fecha:o.date||"",hora:o.time||"",monto:o.finalPrice||0,estado:o.status||"",comuna:o.city||""})),
    "angels_ordenes.csv");

  const exportGastos=()=>exportCSV(gastos.map(g=>({descripcion:g.descripcion||"",tipo:g.tipo||"",monto:g.monto||0,proveedor:g.proveedor||"",fecha:g.fecha||"",boleta:g.boleta||""})),"angels_gastos.csv");

  const exportF29=()=>{
    const ingresos=orders.reduce((s,o)=>s+(o.finalPrice||0),0);
    const gastosTotal=gastos.reduce((s,g)=>s+(g.monto||0),0);
    const rows=[{concepto:"Ingresos brutos totales",monto:ingresos,tipo:"ingreso"},{concepto:"Gastos deducibles",monto:gastosTotal,tipo:"gasto"},{concepto:"Base imponible estimada",monto:ingresos-gastosTotal,tipo:"base"},{concepto:"IVA estimado (19%)",monto:Math.round((ingresos-gastosTotal)*0.19),tipo:"impuesto"}];
    exportCSV(rows,"angels_F29_resumen.csv");
  };

  return(
    <div className="card" style={{maxWidth:560}}>
      <div className="card-title">Exportar datos</div>
      {[
        {icon:"👥",label:"Clientes",sub:`${clients.filter(c=>c.role==="client").length} registros · CSV`,fn:exportClientes},
        {icon:"📋",label:"Órdenes de servicio",sub:`${orders.length} registros · CSV`,fn:exportOrdenes},
        {icon:"📄",label:"Gastos y boletas",sub:`${gastos.length} registros · CSV`,fn:exportGastos},
        {icon:"🧾",label:"Resumen F29 (SII)",sub:"Ingresos, gastos y base imponible estimada",fn:exportF29,highlight:true},
      ].map((opt,i)=>(
        <div className="export-option" key={i} onClick={opt.fn}
          style={opt.highlight?{borderColor:"var(--teal)",background:"rgba(13,148,136,0.04)"}:{}}>
          <div className="export-icon" style={{background:opt.highlight?"rgba(13,148,136,0.12)":"var(--bg2)"}}>
            {opt.icon}
          </div>
          <div style={{flex:1}}>
            <div className="export-label">{opt.label}</div>
            <div className="export-sub">{opt.sub}</div>
          </div>
          <div style={{color:"var(--teal)",fontSize:18}}>↓</div>
        </div>
      ))}
      <div style={{marginTop:16,padding:12,background:"rgba(13,148,136,0.06)",borderRadius:8,border:"1px solid var(--border)"}}>
        <div style={{fontSize:11,fontWeight:600,color:"var(--teal)",marginBottom:4}}>📌 Nota F29</div>
        <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.6}}>El resumen F29 es orientativo. Cuando inicies actividades en el SII, consulta los montos exactos con un agente tributario o usa el asistente IA del SII. Los datos exportados son la base para completar el formulario.</div>
      </div>
    </div>
  );
}

function SettingsPage({theme,setTheme}){
  const [settings,setSettings]=useState({notifEmail:true,notifPush:true,autoExport:false,darkMode:theme==="dark"});
  const toggle=k=>setSettings(s=>{
    const next={...s,[k]:!s[k]};
    if(k==="darkMode")setTheme(next.darkMode?"dark":"light");
    return next;
  });
  const Toggle=({k})=>(
    <div className={`toggle ${settings[k]?"on":""}`} onClick={()=>toggle(k)}>
      <div className="toggle-knob"/>
    </div>
  );
  return(
    <div className="card" style={{maxWidth:520}}>
      <div className="settings-section">
        <div className="settings-title">Apariencia</div>
        <div className="settings-row">
          <div><div className="settings-label">Modo oscuro</div><div className="settings-sub">Activa el tema oscuro en el panel</div></div>
          <Toggle k="darkMode"/>
        </div>
      </div>
      <div className="settings-section">
        <div className="settings-title">Notificaciones</div>
        <div className="settings-row">
          <div><div className="settings-label">Notificaciones por email</div><div className="settings-sub">Nuevas órdenes y pagos</div></div>
          <Toggle k="notifEmail"/>
        </div>
        <div className="settings-row">
          <div><div className="settings-label">Notificaciones push</div><div className="settings-sub">Alertas en tiempo real</div></div>
          <Toggle k="notifPush"/>
        </div>
      </div>
      <div className="settings-section">
        <div className="settings-title">Datos</div>
        <div className="settings-row">
          <div><div className="settings-label">Exportación automática mensual</div><div className="settings-sub">CSV de ingresos y gastos cada 1° del mes</div></div>
          <Toggle k="autoExport"/>
        </div>
      </div>
      <div className="settings-section">
        <div className="settings-title">Cuenta</div>
        <div className="settings-row">
          <div><div className="settings-label">Email administrador</div><div className="settings-sub">ignacio.munoz.venegas@gmail.com</div></div>
          <span className="badge badge-teal">Admin</span>
        </div>
        <div className="settings-row">
          <div><div className="settings-label">Autenticación 2FA</div><div className="settings-sub">Código OTP en cada inicio de sesión</div></div>
          <span className="badge badge-green">Activo</span>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
const NAV=[
  {id:"dashboard",icon:"⬛",label:"Dashboard"},
  {id:"clientes",icon:"👥",label:"Clientes"},
  {id:"servicios",icon:"🧹",label:"Servicios"},
  {id:"ingresos",icon:"📈",label:"Ingresos"},
  {id:"gastos",icon:"🧾",label:"Gastos · Boletas"},
  {id:"cobertura",icon:"📍",label:"Cobertura POB"},
  {id:"exportar",icon:"⬇",label:"Exportar · F29"},
  {id:"settings",icon:"⚙",label:"Configuración"},
];

function App(){
  const [authed,setAuthed]=useState(false);
  const [page,setPage]=useState("dashboard");
  const [theme,setTheme]=useState("dark");
  const [data,setData]=useState({clients:[],orders:[],gastos:[]});
  const [loading,setLoading]=useState(false);
  const [showExpenseModal,setShowExpenseModal]=useState(false);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);},[theme]);

  const loadData=useCallback(async()=>{
    if(!window._db)return;
    setLoading(true);
    try{
      const [usersSnap,ordersSnap,gastosSnap]=await Promise.all([
        window._fns.getDocs(window._fns.collection(window._db,"users")),
        window._fns.getDocs(window._fns.collection(window._db,"orders")),
        window._fns.getDocs(window._fns.collection(window._db,"gastos")).catch(()=>({docs:[]})),
      ]);
      setData({
        clients:usersSnap.docs.map(d=>({uid:d.id,...d.data()})),
        orders:ordersSnap.docs.map(d=>({id:d.id,...d.data()})),
        gastos:gastosSnap.docs.map(d=>({id:d.id,...d.data()})),
      });
    }catch(e){console.warn("loadData:",e.message);}
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(authed)loadData();
  },[authed,loadData]);

  if(!authed)return <LoginScreen onLogin={()=>setAuthed(true)}/>;

  const renderPage=()=>{
    if(loading)return <div className="loader"><div className="spin"/><span>Cargando datos desde Firebase...</span></div>;
    switch(page){
      case"dashboard":return <DashboardPage data={data} onNewExpense={()=>setShowExpenseModal(true)}/>;
      case"clientes":return <ClientesPage data={data}/>;
      case"servicios":return <ServiciosPage data={data}/>;
      case"ingresos":return <IngresosPage data={data}/>;
      case"cobertura":return <CoberturaPOBPage data={data}/>;
      case"gastos":return <GastosPage data={data} onNewExpense={()=>setShowExpenseModal(true)}/>;
      case"exportar":return <ExportPage data={data}/>;
      case"settings":return <SettingsPage theme={theme} setTheme={t=>{setTheme(t);document.documentElement.setAttribute("data-theme",t);}}/>;
      default:return <div className="loader">Sección en construcción 🚧</div>;
    }
  };

  return(
    <div className="shell">
      {showExpenseModal&&<ExpenseModal onClose={()=>setShowExpenseModal(false)} onSave={()=>loadData()}/>}
      <div className="sidebar">
        <div className="sb-logo">
          <img src={LOGO_SRC} alt="Angels"/>
          <div className="sb-logo-text">
            <div className="sb-logo-title">Angels Admin</div>
            <div className="sb-logo-sub">Panel de Control</div>
          </div>
        </div>
        <nav className="sb-nav">
          <div className="sb-section">Principal</div>
          {NAV.slice(0,4).map(n=>(
            <div key={n.id} className={`sb-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              <span className="sb-icon">{n.icon}</span>
              <span className="sb-label">{n.label}</span>
            </div>
          ))}
          <div className="sb-section" style={{marginTop:8}}>Gestión</div>
          {NAV.slice(4,7).map(n=>(
            <div key={n.id} className={`sb-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              <span className="sb-icon">{n.icon}</span>
              <span className="sb-label">{n.label}</span>
            </div>
          ))}
          <div className="sb-section" style={{marginTop:8}}>Sistema</div>
          {NAV.slice(7).map(n=>(
            <div key={n.id} className={`sb-item ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              <span className="sb-icon">{n.icon}</span>
              <span className="sb-label">{n.label}</span>
            </div>
          ))}
        </nav>
        <div className="sb-footer">
          <div className="sb-user">
            <div className="sb-avatar">IM</div>
            <div>
              <div className="sb-user-name">Ignacio M.</div>
              <div className="sb-user-role">Admin · 2FA</div>
            </div>
            <span className="sb-logout" title="Cerrar sesión" onClick={async()=>{await window._fns.signOut(window._auth);setAuthed(false);}}>⏻</span>
          </div>
        </div>
      </div>
      <div className="main">
        <div className="topbar">
          <div className="topbar-left">
            <div>
              <div className="page-title">{NAV.find(n=>n.id===page)?.label||"Dashboard"}</div>
              <div className="page-breadcrumb">Angels Total Care · {new Date().toLocaleDateString("es-CL",{month:"long",year:"numeric"})}</div>
            </div>
          </div>
          <div className="topbar-right">
            <button className="btn btn-outline btn-sm" onClick={loadData}>↻ Actualizar</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setShowExpenseModal(true)}>+ Registrar Gasto</button>
            <button className="theme-toggle" onClick={()=>{const t=theme==="dark"?"light":"dark";setTheme(t);document.documentElement.setAttribute("data-theme",t);}}>
              {theme==="dark"?"☀":"🌙"}
            </button>
          </div>
        </div>
        <div className="content">{renderPage()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
