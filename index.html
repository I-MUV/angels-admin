<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Angels Total Care · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script type="module">

  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendEmailVerification, PhoneAuthProvider, PhoneMultiFactorGenerator, multiFactor, RecaptchaVerifier, getMultiFactorResolver } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, query, where, orderBy, doc, getDoc, addDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDpZMf6woIIAIePzlQcQEyrTWC9JFmm2t4",
    authDomain: "angels-total-care.firebaseapp.com",
    projectId: "angels-total-care",
    storageBucket: "angels-total-care.firebasestorage.app",
    messagingSenderId: "993693587936",
    appId: "1:993693587936:web:211deb9fc2da44b21b7385"
  };

  const app = initializeApp(firebaseConfig);
  window._auth = getAuth(app);
  window._db   = getFirestore(app);
  window._fns  = { signInWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, sendEmailVerification, PhoneAuthProvider, PhoneMultiFactorGenerator, multiFactor, RecaptchaVerifier, getMultiFactorResolver, collection, getDocs, query, where, orderBy, doc, getDoc, addDoc, updateDoc, setDoc };
  window._fbReady = true;
  document.dispatchEvent(new Event("fbReady"));
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root {
  --teal:#0d9488; --teal2:#0a3d3a; --mint:#2dd4bf; --mint2:#5eead4;
  --gold:#f59e0b; --danger:#ef4444; --purple:#8b5cf6;
  --bg:#f0faf9; --bg2:#e1f5ee; --card:#ffffff;
  --sidebar:#072e2b; --sidebar2:#0a3d3a;
  --text:#0a3d3a; --text2:#5f7a78; --text3:#94a3b8;
  --border:#d0eeeb; --border2:#a7f3d0;
  --shadow:0 2px 12px rgba(13,148,136,0.08);
}
[data-theme="dark"]{
  --bg:#0a1f1e; --bg2:#0d2926; --card:#0f2d2a;
  --sidebar:#040f0e; --sidebar2:#071a18;
  --text:#e1f5ee; --text2:#5eead4; --text3:#2dd4bf88;
  --border:#0d9488aa; --border2:#0d948855;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
#root{height:100%;}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#072e2b 0%,#0a3d3a 40%,#0d5c56 100%);position:relative;overflow:hidden;}
.login-bg-circles{position:absolute;inset:0;pointer-events:none;}
.login-bg-circles span{position:absolute;border-radius:50%;border:1px solid rgba(45,212,191,0.12);}
.login-card{background:rgba(255,255,255,0.04);border:1px solid rgba(45,212,191,0.2);border-radius:20px;padding:40px 36px;width:380px;backdrop-filter:blur(20px);position:relative;z-index:1;}
.login-logo{width:72px;height:72px;object-fit:contain;border-radius:50%;display:block;margin:0 auto 20px;}
.login-title{color:#2dd4bf;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:4px;}
.login-sub{color:rgba(255,255,255,0.4);font-size:11px;text-align:center;margin-bottom:28px;}
.login-field{margin-bottom:14px;}
.login-field label{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(45,212,191,0.7);margin-bottom:6px;}
.login-field input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(45,212,191,0.2);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s;}
.login-field input:focus{border-color:#2dd4bf;}
.login-field input::placeholder{color:rgba(255,255,255,0.25);}
.login-btn{width:100%;background:linear-gradient(135deg,#0d9488,#0a3d3a);color:#fff;border:none;border-radius:10px;padding:13px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
.login-btn:hover{opacity:0.85;}
.login-err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:9px 12px;color:#fca5a5;font-size:12px;text-align:center;margin-top:12px;}
.login-2fa{margin-top:16px;padding:14px;background:rgba(45,212,191,0.06);border:1px solid rgba(45,212,191,0.15);border-radius:10px;}
.login-2fa p{font-size:11px;color:rgba(255,255,255,0.5);text-align:center;margin-bottom:10px;}
.otp-inputs{display:flex;gap:8px;justify-content:center;}
.otp-inputs input{width:40px;height:44px;background:rgba(255,255,255,0.06);border:1px solid rgba(45,212,191,0.2);border-radius:8px;color:#fff;font-size:18px;font-weight:600;text-align:center;outline:none;}
.otp-inputs input:focus{border-color:#2dd4bf;}

/* ── SHELL ── */
.shell{display:flex;height:100vh;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;border-right:1px solid rgba(45,212,191,0.08);transition:background 0.3s;}
.sb-logo{padding:20px 16px 18px;border-bottom:1px solid rgba(45,212,191,0.08);display:flex;align-items:center;gap:10px;}
.sb-logo img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.sb-logo-text{line-height:1.2;}
.sb-logo-title{color:#2dd4bf;font-size:12px;font-weight:700;letter-spacing:1px;}
.sb-logo-sub{color:rgba(45,212,191,0.4);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto;}
.sb-section{padding:8px 14px 4px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(45,212,191,0.25);}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:all 0.15s;margin:1px 0;}
.sb-item:hover{background:rgba(45,212,191,0.06);color:rgba(45,212,191,0.8);}
.sb-item.active{border-left-color:#2dd4bf;background:rgba(45,212,191,0.1);color:#2dd4bf;}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.sb-label{font-size:12px;font-weight:500;color:inherit;}
.sb-item:not(.active) .sb-label{color:rgba(255,255,255,0.45);}
.sb-item:not(.active) .sb-icon{opacity:0.45;}
.sb-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:9px;font-weight:700;border-radius:10px;padding:1px 6px;}
.sb-footer{padding:14px 12px;border-top:1px solid rgba(45,212,191,0.08);}
.sb-user{display:flex;align-items:center;gap:9px;cursor:pointer;}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#0d9488,#2dd4bf);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-user-name{font-size:12px;font-weight:500;color:rgba(255,255,255,0.8);}
.sb-user-role{font-size:9px;color:#2dd4bf;letter-spacing:1px;text-transform:uppercase;}
.sb-logout{margin-left:auto;font-size:10px;color:rgba(255,255,255,0.2);cursor:pointer;padding:4px;}
.sb-logout:hover{color:#ef4444;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.page-title{font-size:16px;font-weight:600;color:var(--text);}
.page-breadcrumb{font-size:11px;color:var(--text3);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;border:1.5px solid;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;}
.btn-outline{background:transparent;border-color:var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--teal);color:var(--teal);background:rgba(13,148,136,0.06);}
.btn-primary{background:var(--teal);border-color:var(--teal);color:#fff;}
.btn-primary:hover{background:#0b7a70;border-color:#0b7a70;}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;}
.btn-gold:hover{background:#d97706;border-color:#d97706;}
.btn-danger{background:var(--danger);border-color:var(--danger);color:#fff;}
.btn-sm{padding:5px 12px;font-size:11px;}
.theme-toggle{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;color:var(--text2);}
.theme-toggle:hover{border-color:var(--teal);background:rgba(13,148,136,0.06);}

.content{flex:1;overflow-y:auto;padding:20px 24px;}

/* ── CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-accent{position:absolute;top:0;left:0;right:0;height:3px;}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:10px;}
.kpi-value{font-size:26px;font-weight:700;color:var(--text);line-height:1;font-family:'DM Mono',monospace;}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px;}
.kpi-sub.up{color:#22c55e;}
.kpi-sub.down{color:var(--danger);}

.grid-2{display:grid;grid-template-columns:1.5fr 1fr;gap:12px;margin-bottom:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
.card-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.card-title a{font-size:10px;color:var(--teal);cursor:pointer;font-weight:600;text-decoration:none;}

/* ── CHART ── */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:100px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bar-fill{width:100%;border-radius:5px 5px 0 0;transition:height 0.4s ease;min-height:4px;}
.bar-month{font-size:8px;color:var(--text3);font-family:'DM Mono',monospace;}
.bar-val{font-size:8px;color:var(--text2);font-weight:600;}

/* ── TABLE ── */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.data-table td{padding:10px 12px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(13,148,136,0.04);}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;}
.badge-teal{background:rgba(13,148,136,0.12);color:#0d9488;}
.badge-gold{background:rgba(245,158,11,0.12);color:#d97706;}
.badge-green{background:rgba(34,197,94,0.12);color:#16a34a;}
.badge-red{background:rgba(239,68,68,0.12);color:#dc2626;}
.badge-purple{background:rgba(139,92,246,0.12);color:#7c3aed;}
.badge-gray{background:rgba(100,116,139,0.12);color:#475569;}

/* ── CLIENT ROW ── */
.client-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.client-row:last-child{border-bottom:none;}
.avatar-sm{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--mint));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.client-name{font-size:12px;font-weight:600;color:var(--text);}
.client-meta{font-size:10px;color:var(--text3);}
.client-amount{font-size:12px;font-weight:700;color:var(--teal);font-family:'DM Mono',monospace;}

/* ── DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:16px;}
.legend{display:flex;flex-direction:column;gap:7px;flex:1;}
.legend-item{display:flex;align-items:center;gap:7px;}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.legend-label{font-size:11px;color:var(--text2);flex:1;}
.legend-pct{font-size:11px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;}

/* ── EXPENSE ── */
.expense-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.expense-item:last-child{border-bottom:none;}
.expense-cat{display:flex;align-items:center;gap:8px;}
.expense-dot{width:8px;height:8px;border-radius:50%;}
.expense-name{font-size:12px;color:var(--text);}
.expense-date{font-size:10px;color:var(--text3);}
.expense-amount{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;}

/* ── SCAN ── */
.scan-zone{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;background:rgba(13,148,136,0.03);cursor:pointer;transition:all 0.2s;}
.scan-zone:hover{border-color:var(--teal);background:rgba(13,148,136,0.07);}
.scan-icon{font-size:28px;margin-bottom:8px;}
.scan-text{font-size:11px;color:var(--text3);line-height:1.6;}

/* ── POB MAP ── */
.pob-commune{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.pob-commune:last-child{border-bottom:none;}
.pob-bar-wrap{flex:1;margin:0 12px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.pob-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),var(--mint));transition:width 0.6s ease;}
.pob-count{font-size:11px;font-weight:700;color:var(--teal);font-family:'DM Mono',monospace;min-width:28px;text-align:right;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:460px;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;}
.modal-close:hover{color:var(--danger);}
.form-field{margin-bottom:14px;}
.form-label{display:block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;}
.form-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s;}
.form-input:focus{border-color:var(--teal);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
textarea.form-input{min-height:80px;resize:vertical;}

/* ── SETTINGS ── */
.settings-section{margin-bottom:24px;}
.settings-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:13px;color:var(--text);}
.settings-sub{font-size:11px;color:var(--text3);}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
.toggle.on{background:var(--teal);}
.toggle-knob{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.2);}
.toggle.on .toggle-knob{left:21px;}

/* ── EXPORT ── */
.export-option{display:flex;align-items:center;gap:14px;padding:14px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:all 0.15s;margin-bottom:10px;}
.export-option:hover{border-color:var(--teal);background:rgba(13,148,136,0.04);}
.export-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.export-label{font-size:13px;font-weight:600;color:var(--text);}
.export-sub{font-size:11px;color:var(--text3);}

/* ── LOADING ── */
.loader{display:flex;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--text3);font-size:13px;}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}}

/* ── COBERTURA POB MAP ── */
.pob-map-wrap{flex:1;overflow:hidden;border-radius:10px;background:var(--bg2);cursor:grab;position:relative;min-height:440px;border:1px solid var(--border);}
.pob-map-wrap:active{cursor:grabbing;}
.pob-map-wrap svg{width:100%;height:100%;display:block;}
.pob-map-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.pob-filters{display:flex;gap:6px;}
.pob-filter-btn{font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.pob-filter-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);}
.pob-filter-btn:hover:not(.active){background:var(--bg2);border-color:var(--teal);}
.pob-zoom-controls{display:flex;gap:5px;align-items:center;}
.pob-zoom-btn{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.pob-zoom-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
.pob-zoom-label{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;min-width:32px;text-align:center;}
.pob-zoom-hint{position:absolute;bottom:8px;left:10px;font-size:9px;color:var(--text3);pointer-events:none;letter-spacing:0.5px;}
.pob-legend-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.pob-legend-chip{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:capitalize;cursor:pointer;border:1.5px solid transparent;transition:all 0.15s;}
.pob-legend-chip:hover{opacity:0.8;}
.pob-legend-chip.active{border-color:var(--teal)!important;}
.pob-layout{display:grid;grid-template-columns:1fr 240px;gap:12px;margin-bottom:16px;}
.pob-panel{display:flex;flex-direction:column;gap:10px;}
.pob-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;}
.pob-stat-box{background:var(--bg2);border-radius:8px;padding:9px 7px;text-align:center;}
.pob-stat-val{font-size:16px;font-weight:800;font-family:'DM Mono',monospace;line-height:1;}
.pob-stat-lbl{font-size:7.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-top:3px;}
.pob-rank-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity 0.15s;}
.pob-rank-row:last-child{border:none;}
.pob-rank-row:hover{opacity:0.65;}
.pob-rank-num{font-size:8px;color:var(--text3);font-family:'DM Mono',monospace;min-width:13px;}
.pob-rank-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pob-rank-name{font-size:10px;font-weight:600;flex:1;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pob-rank-bar-wrap{width:36px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.pob-rank-bar-fill{height:100%;border-radius:2px;}
.pob-rank-val{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;min-width:34px;text-align:right;}
.pob-zona-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.pob-zona-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0;}
.pob-zona-name{font-size:10px;font-weight:600;color:var(--text2);text-transform:capitalize;min-width:52px;}
.pob-zona-bar-wrap{flex:1;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden;}
.pob-zona-bar-fill{height:100%;border-radius:2px;}
.pob-zona-pct{font-size:9px;font-weight:700;font-family:'DM Mono',monospace;color:var(--text2);}
.pob-placeholder{text-align:center;padding:16px 0;color:var(--text3);font-size:11px;line-height:1.8;}
.comuna-path{stroke:rgba(255,255,255,0.7);stroke-width:0.5;cursor:pointer;transition:stroke-width 0.1s,filter 0.1s;}
.comuna-path:hover{stroke-width:1.5;filter:brightness(1.12) saturate(1.2);}
.comuna-path.selected{stroke:rgba(255,255,255,0.9);stroke-width:1px;filter:brightness(1.25) saturate(1.4);}
.comuna-path.periferico{stroke:rgba(255,255,255,0.3);}
text.lbl-name{font-family:'DM Sans',sans-serif;font-weight:700;fill:#1e293b;text-anchor:middle;dominant-baseline:middle;pointer-events:none;}
text.lbl-name.periferico{fill:#6b7280;}
text.lbl-val{font-family:'DM Mono',monospace;font-weight:800;text-anchor:middle;dominant-baseline:middle;pointer-events:none;}
#pob-tooltip{position:fixed;background:var(--card);border:1.5px solid var(--teal);border-radius:12px;padding:11px 14px;pointer-events:none;display:none;z-index:1001;min-width:155px;box-shadow:0 8px 28px rgba(13,148,136,0.18);}
#pob-tooltip .ptt-name{font-size:13px;font-weight:800;color:var(--text);margin-bottom:7px;}
#pob-tooltip .ptt-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px;}
#pob-tooltip .ptt-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;}
#pob-tooltip .ptt-value{font-size:10px;font-weight:700;color:var(--teal);font-family:'DM Mono',monospace;}

</style>
</head>

      window._recaptchaVerifier=null;
    }
    // Limpiar el div contenedor
    const el=document.getElementById(containerId);
    if(el) el.innerHTML="";

    const verifier=new window._fns.RecaptchaVerifier(window._auth, containerId, {
      size:"invisible",
      callback:()=>{}
    });
    await verifier.render();
    window._recaptchaVerifier=verifier;
    return verifier;
  };

  // PASO 1 — Login con email + contraseña
  const handleCreds=async()=>{
    if(!email||!pass){setErr("Completa todos los campos");return;}
    if(email.trim().toLowerCase()!==ADMIN_EMAIL){setErr("Acceso restringido al administrador");return;}
    setLoading(true);setErr("");
    try{
      const cred=await window._fns.signInWithEmailAndPassword(window._auth,email,pass);
      const user=cred.user;
      // ¿Email verificado?
      if(!user.emailVerified){
        await window._fns.sendEmailVerification(user);
        setStep(2);
        setLoading(false);
        return;
      }
      // Login exitoso sin MFA (primer enrolamiento)
      const factors=window._fns.multiFactor(user).enrolledFactors;
      if(factors.length===0){
        setStep(3); // Enrolar teléfono
      } else {
        onLogin();
      }
    }catch(e){
      if(e.code==="auth/multi-factor-auth-required"){
        // Firebase SDK v10 modular: usar getMultiFactorResolver explícitamente
        let resolver = null;
        try { resolver = window._fns.getMultiFactorResolver(window._auth, e); } catch(_){}
        if(!resolver) resolver = e.resolver || (e.customData && e.customData.resolver) || null;
        console.log("MFA resolver:", JSON.stringify({code:e.code, hasResolver:!!resolver, hints:resolver?.hints?.length}));
        if(!resolver){
          setErr("Error MFA: resolver no disponible. Verifica que el MFA esté enrollado en Firebase Console.");
          setLoading(false);
          return;
        }
        if(resolver.hints && resolver.hints.length>0){
          setMfaResolver(resolver);
          setLoading(false);
          await sendMfaSms(resolver);
        } else {
          setMfaResolver(resolver);
          setStep(3);
          setLoading(false);
        }
        return;
      }
      const msgs={
        "auth/invalid-credential":"Credenciales incorrectas",
        "auth/invalid-email":"Email inválido",
        "auth/wrong-password":"Contraseña incorrecta",
        "auth/too-many-requests":"Demasiados intentos. Espera unos minutos."
      };
      setErr(msgs[e.code]||`Error: ${e.message}`);
    }
    setLoading(false);
  };

  // Envía SMS al número ya enrollado (login normal con MFA)
  const sendMfaSms=async(resolver)=>{
    setLoading(true);setErr("");
    try{
      if(!resolver||!resolver.hints||resolver.hints.length===0){
        setErr("No se encontró factor MFA enrollado.");
        setLoading(false);
        return;
      }
      const hint=resolver.hints[0];
      const verifier=await createRecaptcha("recaptcha-mfa");
      const provider=new window._fns.PhoneAuthProvider(window._auth);
      const vid=await provider.verifyPhoneNumber(
        {multiFactorHint:hint, session:resolver.session},
        verifier
      );
      setVerificationId(vid);
      setStep(5);
      setInfo(`SMS enviado a ${hint.phoneNumber}`);
    }catch(e){
      setErr(`Error enviando SMS: ${e.message}`);
    }
    setLoading(false);
  };

  // PASO 3→4 — Enrolamiento: enviar SMS al número nuevo
  const handleEnrollSend=async()=>{
    if(!phone||phone.length<8){setErr("Ingresa un número válido con código de país");return;}
    setLoading(true);setErr("");
    try{
      const verifier=await createRecaptcha("recaptcha-enroll");
      const provider=new window._fns.PhoneAuthProvider(window._auth);
      let vid;
      if(mfaResolver){
        // Viene del flujo MFA (sin currentUser disponible aún) → usar sesión del resolver
        vid=await provider.verifyPhoneNumber({phoneNumber:phone, session:mfaResolver.session}, verifier);
      } else {
        // Viene del flujo normal (usuario ya autenticado, sin MFA previo)
        const user=window._auth.currentUser;
        if(!user){setErr("Sesión expirada, vuelve a ingresar");setStep(1);setLoading(false);return;}
        const session=await window._fns.multiFactor(user).getSession();
        vid=await provider.verifyPhoneNumber({phoneNumber:phone, session}, verifier);
      }
      setVerificationId(vid);
      setStep(4);
      setInfo(`SMS enviado a ${phone}`);
    }catch(e){
      setErr(`Error: ${e.message}`);
    }
    setLoading(false);
  };

  // PASO 4 — Confirmar código de enrolamiento
  const handleEnrollConfirm=async()=>{
    const code=smsCode.join("");
    if(code.length!==6){setErr("Ingresa los 6 dígitos");return;}
    setLoading(true);setErr("");
    try{
      const cred=window._fns.PhoneAuthProvider.credential(verificationId,code);
      const assertion=window._fns.PhoneMultiFactorGenerator.assertion(cred);
      if(mfaResolver){
        // Enrolamiento desde flujo MFA: resolver el sign-in Y enrolar en un paso
        // Primero completamos el sign-in con el resolver
        await mfaResolver.resolveSignIn(assertion);
        // Luego enrollamos (ahora currentUser está disponible)
        const user=window._auth.currentUser;
        if(user) await window._fns.multiFactor(user).enroll(assertion,"Celular admin");
      } else {
        const user=window._auth.currentUser;
        await window._fns.multiFactor(user).enroll(assertion,"Celular admin");
      }
      setInfo("✅ MFA activado correctamente");
      setTimeout(()=>onLogin(),1200);
    }catch(e){
      setErr(`Código incorrecto o expirado: ${e.message}`);
    }
    setLoading(false);
  };

  // PASO 5 — Verificar SMS en login normal
  const handleMfaVerify=async()=>{
    const code=smsCode.join("");
    if(code.length!==6){setErr("Ingresa los 6 dígitos");return;}
    setLoading(true);setErr("");
    try{
      const cred=window._fns.PhoneAuthProvider.credential(verificationId,code);
      const assertion=window._fns.PhoneMultiFactorGenerator.assertion(cred);
      await mfaResolver.resolveSignIn(assertion);
      onLogin();
    }catch(e){
      setErr(`Código incorrecto o expirado: ${e.message}`);
    }
    setLoading(false);
  };

  const handleSmsInput=(i,val)=>{
    if(!/^\d?$/.test(val))return;
    const next=[...smsCode];next[i]=val;setSmsCode(next);
    if(val&&i<5)document.getElementById(`sms${i+1}`)?.focus();
  };

  const SmsInputs=()=>(
    <div className="otp-inputs">
      {smsCode.map((v,i)=>(
        <input key={i} id={`sms${i}`} maxLength={1} value={v}
          onChange={e=>handleSmsInput(i,e.target.value)}
          onKeyDown={e=>{if(e.key==="Backspace"&&!v&&i>0)document.getElementById(`sms${i-1}`)?.focus();
                         if(e.key==="Enter")(step===4?handleEnrollConfirm:handleMfaVerify)();}}/>
      ))}
    </div>
  );

  return(
    <div className="login-wrap">
      <div className="login-bg-circles">
        {[300,500,700,900].map((s,i)=>(
          <span key={i} style={{width:s,height:s,top:"50%",left:"50%",transform:`translate(-50%,-50%)`,opacity:0.3-i*0.05}}/>
        ))}
      </div>
      <div className="login-card">
        <img src={LOGO_SRC} className="login-logo" alt="Angels"/>
        <div className="login-title">Angels Total Care</div>
        <div className="login-sub">Panel de Administración · Acceso restringido</div>

        {/* PASO 1 — Credenciales */}
        {step===1&&(
          <>
            <div className="login-field">
              <label>Correo</label>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="admin@angels.cl" onKeyDown={e=>e.key==="Enter"&&handleCreds()}/>
            </div>
            <div className="login-field">
              <label>Contraseña</label>
              <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&handleCreds()}/>
            </div>
            <button className="login-btn" onClick={handleCreds} disabled={loading}>
              {loading?"Verificando...":"Ingresar →"}
            </button>
            <div id="recaptcha-mfa"></div>
          </>
        )}

        {/* PASO 2 — Email no verificado */}
        {step===2&&(
          <div className="login-2fa">
            <div style={{textAlign:"center",marginBottom:16}}>
              <div style={{fontSize:32,marginBottom:8}}>📧</div>
              <p style={{color:"#2dd4bf",fontSize:13,fontWeight:600,marginBottom:6}}>Verifica tu email</p>
              <p style={{color:"rgba(255,255,255,0.5)",fontSize:11,lineHeight:1.6}}>
                Enviamos un link de verificación a<br/>
                <strong style={{color:"rgba(255,255,255,0.8)"}}>{email}</strong><br/>
                Ábrelo y luego vuelve a ingresar.
              </p>
            </div>
            <button className="login-btn" onClick={()=>{setSmsCode(["","","","","",""]);setStep(1);setErr("");}}>
              ← Ya lo verifiqué, volver
            </button>
          </div>
        )}

        {/* PASO 3 — Primer uso: enrolar teléfono */}
        {step===3&&(
          <div className="login-2fa">
            <p style={{color:"#2dd4bf",fontSize:12,fontWeight:600,textAlign:"center",marginBottom:4}}>🔐 Activar verificación en 2 pasos</p>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:10,textAlign:"center",marginBottom:14,lineHeight:1.5}}>
              Primera vez: ingresa tu número para recibir un SMS de verificación.
            </p>
            <div className="login-field">
              <label>Número de teléfono</label>
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+56 9 1234 5678"/>
            </div>
            <button className="login-btn" onClick={handleEnrollSend} disabled={loading}>
              {loading?"Enviando SMS...":"Enviar código SMS →"}
            </button>
            <div id="recaptcha-enroll"></div>
          </div>
        )}

        {/* PASO 4 — Confirmar código de enrolamiento */}
        {step===4&&(
          <div className="login-2fa">
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:11,textAlign:"center",marginBottom:14}}>{info}</p>
            <SmsInputs/>
            <button className="login-btn" style={{marginTop:14}} onClick={handleEnrollConfirm} disabled={loading}>
              {loading?"Verificando...":"Confirmar y activar MFA"}
            </button>
          </div>
        )}

        {/* PASO 5 — Login normal con MFA */}
        {step===5&&(
          <div className="login-2fa">
            <div style={{textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:28,marginBottom:6}}>📱</div>
              <p style={{color:"rgba(255,255,255,0.5)",fontSize:11}}>{info}</p>
            </div>
            <SmsInputs/>
            <button className="login-btn" style={{marginTop:14}} onClick={handleMfaVerify} disabled={loading}>
              {loading?"Verificando...":"Confirmar acceso →"}
            </button>
          </div>
        )}

        {info&&step!==5&&step!==4&&<div style={{marginTop:12,padding:"8px 12px",background:"rgba(34,197,94,0.1)",border:"1px solid rgba(34,197,94,0.3)",borderRadius:8,color:"#86efac",fontSize:11,textAlign:"center"}}>{info}</div>}
        {err&&<div className="login-err">{err}</div>}
      </div>
    </div>
  );
}

// ── KPI CARD ──────────────────────────────────────────────────
function KPI({label,value,sub,trend,color}){
  const colors={teal:"#0d9488",mint:"#2dd4bf",gold:"#f59e0b",red:"#ef4444",purple:"#8b5cf6"};
  return(
    <div className="kpi">
      <div className="kpi-accent" style={{background:colors[color]||colors.teal}}/>
      <div className="kpi-label">{label}</div>
      <div className="kpi-value">{value}</div>
      {sub&&<div className={`kpi-sub ${trend==="up"?"up":trend==="down"?"down":""}`}>
        {trend==="up"?"↑":trend==="down"?"↓":""} {sub}
      </div>}
    </div>
  );
}

// ── BAR CHART ─────────────────────────────────────────────────
function BarChart({data,maxVal}){
  const max=maxVal||Math.max(...data.map(d=>d.v),1);
  return(
    <div className="bar-chart">
      {data.map((d,i)=>(
        <div className="bar-col" key={i}>
          <div className="bar-val">{d.v>0?fmtK(d.v):""}</div>
          <div className="bar-fill" style={{height:`${Math.max((d.v/max)*85,d.v>0?8:4)}px`,
            background:d.active?"linear-gradient(to top,#0d9488,#2dd4bf)":d.proj?"rgba(45,212,191,0.25)":"rgba(45,212,191,0.15)"}}/>
          <div className="bar-month">{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ── MODAL REGISTRO GASTO ──────────────────────────────────────
function ExpenseModal({onClose,onSave}){
  const [form,setForm]=useState({tipo:"insumo",descripcion:"",monto:"",proveedor:"",fecha:new Date().toISOString().split("T")[0],boleta:"",notas:""});
  const upd=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const handleSave=async()=>{
    if(!form.descripcion||!form.monto){alert("Completa descripción y monto");return;}
    if(window._db){
      await window._fns.addDoc(window._fns.collection(window._db,"gastos"),{
        ...form,monto:parseInt(form.monto),creadoEn:new Date().toISOString()
      });
    }
    onSave(form);onClose();
  };
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">
          Registrar Gasto / Boleta
          <span className="modal-close" onClick={onClose}>✕</span>
        </div>
        <div className="form-field">
          <label className="form-label">Categoría</label>
          <select className="form-select" value={form.tipo} onChange={upd("tipo")}>
            <option value="insumo">Insumos de limpieza</option>
            <option value="epp">EPP / Seguridad</option>
            <option value="traslado">Traslado / Combustible</option>
            <option value="herramienta">Herramientas / Equipos</option>
            <option value="marketing">Marketing / Publicidad</option>
            <option value="otro">Otro</option>
          </select>
        </div>
        <div className="form-row">
          <div className="form-field">
            <label className="form-label">Descripción</label>
            <input className="form-input" value={form.descripcion} onChange={upd("descripcion")} placeholder="Ej: Cloro industrial 5L"/>
          </div>
          <div className="form-field">
            <label className="form-label">Monto ($)</label>
            <input className="form-input" type="number" value={form.monto} onChange={upd("monto")} placeholder="15000"/>
          </div>
        </div>
        <div className="form-row">
          <div className="form-field">
            <label className="form-label">Proveedor</label>
            <input className="form-input" value={form.proveedor} onChange={upd("proveedor")} placeholder="Sodimac / Jumbo..."/>
          </div>
          <div className="form-field">
            <label className="form-label">Fecha</label>
            <input className="form-input" type="date" value={form.fecha} onChange={upd("fecha")}/>
          </div>
        </div>
        <div className="form-field">
          <label className="form-label">N° Boleta / Factura</label>
          <input className="form-input" value={form.boleta} onChange={upd("boleta")} placeholder="123456 (opcional)"/>
        </div>
        <div className="form-field">
          <label className="form-label">Notas</label>
          <textarea className="form-input" value={form.notas} onChange={upd("notas")} placeholder="Observaciones opcionales..."/>
        </div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button className="btn btn-outline" style={{flex:1}} onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{flex:1}} onClick={handleSave}>Guardar Gasto</button>
        </div>
      </div>
    </div>
  );
}

// ── PÁGINA SERVICIOS ──────────────────────────────────────────
function ServiciosPage({data}){
  const {orders,clients}=data;
  const [filtro,setFiltro]=React.useState("todos");
  const [busqueda,setBusqueda]=React.useState("");
  const [ordenDetalle,setOrdenDetalle]=React.useState(null);

  const STATUS_CONFIG={
    pending_payment: {label:"Pago pendiente",  color:"gold",   dot:"#f59e0b"},
    payment_failed:  {label:"Pago fallido",    color:"red",    dot:"#ef4444"},
    waiting:         {label:"Esperando Ángel", color:"teal",   dot:"#0d9488"},
    accepted:        {label:"Ángel asignada",  color:"teal",   dot:"#2dd4bf"},
    on_way:          {label:"En camino",       color:"purple", dot:"#8b5cf6"},
    arrived:         {label:"Llegó",           color:"purple", dot:"#a78bfa"},
    working:         {label:"En servicio",     color:"green",  dot:"#22c55e"},
    done:            {label:"Completado",      color:"gray",   dot:"#64748b"},
    cancelled:       {label:"Cancelado",       color:"red",    dot:"#ef4444"},
    plan_active:     {label:"Plan activo",     color:"teal",   dot:"#0d9488"},
    plan_done:       {label:"Plan completado", color:"gray",   dot:"#64748b"},
  };

  const FILTROS=[
    {id:"todos",      label:"Todos"},
    {id:"activos",    label:"🟢 Activos",    statuses:["waiting","accepted","on_way","arrived","working"]},
    {id:"planes",     label:"📅 Planes",     statuses:["plan_active","plan_done"]},
    {id:"pendientes", label:"⏳ Pendientes", statuses:["pending_payment","payment_failed"]},
    {id:"completados",label:"✅ Completados",statuses:["done"]},
    {id:"cancelados", label:"❌ Cancelados", statuses:["cancelled"]},
  ];

  const ordensFiltrados=React.useMemo(()=>{
    let list=[...orders];
    // Filtro por estado
    const f=FILTROS.find(x=>x.id===filtro);
    if(f&&f.statuses) list=list.filter(o=>f.statuses.includes(o.status));
    // Búsqueda
    if(busqueda.trim()){
      const q=busqueda.toLowerCase();
      list=list.filter(o=>
        (o.clientName||"").toLowerCase().includes(q)||
        (o.name||"").toLowerCase().includes(q)||
        (o.addr||"").toLowerCase().includes(q)||
        (o.city||"").toLowerCase().includes(q)||
        (o.id||"").toLowerCase().includes(q)
      );
    }
    // Ordenar por fecha desc
    return list.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
  },[orders,filtro,busqueda]);

  const fmt=n=>`$${Math.round(n||0).toLocaleString("es-CL")}`;
  const fmtDate=str=>{
    if(!str)return"—";
    const d=new Date(str);
    return isNaN(d)? str : d.toLocaleDateString("es-CL",{day:"2-digit",month:"short",year:"numeric"});
  };

  const StatusBadge=({status})=>{
    const cfg=STATUS_CONFIG[status]||{label:status,color:"gray",dot:"#94a3b8"};
    const colors={
      teal:"rgba(13,148,136,0.12)",gold:"rgba(245,158,11,0.12)",
      red:"rgba(239,68,68,0.12)",purple:"rgba(139,92,246,0.12)",
      green:"rgba(34,197,94,0.12)",gray:"rgba(100,116,139,0.12)"
    };
    const textColors={
      teal:"#0d9488",gold:"#d97706",red:"#dc2626",
      purple:"#7c3aed",green:"#16a34a",gray:"#475569"
    };
    return(
      <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",
        borderRadius:20,fontSize:10,fontWeight:600,
        background:colors[cfg.color],color:textColors[cfg.color]}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:cfg.dot,display:"inline-block"}}/>
        {cfg.label}
      </span>
    );
  };

  // Contadores por estado
  const activos=orders.filter(o=>["waiting","accepted","on_way","arrived","working"].includes(o.status)).length;
  const planes=orders.filter(o=>["plan_active"].includes(o.status)).length;
  const hoy=orders.filter(o=>o.date===new Date().toLocaleDateString("es-CL")).length;

  if(ordenDetalle) return(
    <OrdenDetalle orden={ordenDetalle} onBack={()=>setOrdenDetalle(null)}
      StatusBadge={StatusBadge} STATUS_CONFIG={STATUS_CONFIG} fmt={fmt} fmtDate={fmtDate}/>
  );

  return(
    <>
      {/* KPIs rápidos */}
      <div className="kpi-grid" style={{marginBottom:16}}>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#22c55e"}}/>
          <div className="kpi-label">Activos ahora</div>
          <div className="kpi-value">{activos}</div>
          <div className="kpi-sub">en curso o esperando</div>
        </div>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#0d9488"}}/>
          <div className="kpi-label">Planes activos</div>
          <div className="kpi-value">{planes}</div>
          <div className="kpi-sub">suscripciones vigentes</div>
        </div>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#8b5cf6"}}/>
          <div className="kpi-label">Servicios hoy</div>
          <div className="kpi-value">{hoy}</div>
          <div className="kpi-sub">{new Date().toLocaleDateString("es-CL",{weekday:"long"})}</div>
        </div>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#f59e0b"}}/>
          <div className="kpi-label">Total órdenes</div>
          <div className="kpi-value">{orders.length}</div>
          <div className="kpi-sub">histórico completo</div>
        </div>
      </div>

      {/* Filtros + búsqueda */}
      <div className="card" style={{marginBottom:12}}>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
          {FILTROS.map(f=>(
            <button key={f.id} onClick={()=>setFiltro(f.id)}
              style={{padding:"5px 14px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
                border:`1.5px solid ${filtro===f.id?"var(--teal)":"var(--border)"}`,
                background:filtro===f.id?"rgba(13,148,136,0.1)":"transparent",
                color:filtro===f.id?"var(--teal)":"var(--text2)"}}>
              {f.label} {f.statuses?`(${orders.filter(o=>f.statuses.includes(o.status)).length})`:``}
            </button>
          ))}
        </div>
        <input
          style={{width:"100%",background:"var(--bg)",border:"1.5px solid var(--border)",
            borderRadius:8,padding:"9px 12px",color:"var(--text)",fontSize:13,outline:"none"}}
          placeholder="Buscar por cliente, servicio, dirección o ID..."
          value={busqueda} onChange={e=>setBusqueda(e.target.value)}
        />
      </div>

      {/* Tabla */}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"var(--text2)"}}>
            Órdenes de servicio

                          <div style={{fontSize:10,color:"var(--text3)"}}>{o.clientPhone||""}</div>

                      </div>

                      <div style={{fontSize:10,color:"var(--text3)"}}>{o.category==="plan"?"📅 Plan":"🔧 Servicio"} · {o.duration||"?"}h</div>
                    </td>
                    <td>
                      <div style={{fontSize:12,color:"var(--text)",fontFamily:"DM Mono,monospace"}}>{o.date||"—"}</div>
                      <div style={{fontSize:10,color:"var(--text3)"}}>{o.time||""}</div>
                    </td>
                    <td>
                      <div style={{fontSize:11,color:"var(--text2)",maxWidth:160,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {o.addr||"—"}
                      </div>
                      <div style={{fontSize:10,color:"var(--text3)"}}>{o.city||o.commune||""}</div>
                    </td>
                    <td>
                      <div style={{fontSize:12,fontWeight:700,color:"var(--teal)",fontFamily:"DM Mono,monospace"}}>
                        {fmt(o.finalPrice)}
                      </div>
                      {o.discount&&<div style={{fontSize:9,color:"#f59e0b"}}>🏷 {o.discount.label||"Dcto"}</div>}
                    </td>
                    <td><StatusBadge status={o.status}/></td>
                    <td>
                      <span style={{fontSize:11,color:"var(--teal)",cursor:"pointer",fontWeight:600}}>Ver →</span>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </>
  );
}

// ── PÁGINA INGRESOS ───────────────────────────────────────────
function IngresosPage({data}){
  const {orders,gastos}=data;
  const [periodo,setPeriodo]=React.useState("mes");
  const [mesIdx,setMesIdx]=React.useState(new Date().getMonth());
  const [anio,setAnio]=React.useState(new Date().getFullYear());

  const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const MESES_CORTO=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

  const fmt=n=>`$${Math.round(n||0).toLocaleString("es-CL")}`;
  const fmtK=n=>n>=1000000?`$${(n/1000000).toFixed(1)}M`:n>=1000?`$${Math.round(n/1000)}k`:fmt(n);

  // Órdenes pagadas
  const pagadas=React.useMemo(()=>orders.filter(o=>
    o.paymentStatus==="approved"||
    ["waiting","accepted","on_way","arrived","working","done","plan_active","plan_done"].includes(o.status)
  ),[orders]);

  // Filtrar por periodo
  const ordenesPeriodo=React.useMemo(()=>{
    return pagadas.filter(o=>{
      const d=new Date(o.paidAt||o.createdAt||0);
      if(periodo==="mes") return d.getMonth()===mesIdx&&d.getFullYear()===anio;
      if(periodo==="anio") return d.getFullYear()===anio;
      return true; // todo
    });
  },[pagadas,periodo,mesIdx,anio]);

  const totalIngresos=ordenesPeriodo.reduce((s,o)=>s+(o.finalPrice||0),0);
  const totalReservas=ordenesPeriodo.reduce((s,o)=>s+(o.reserva||0),0);
  const totalSaldos=ordenesPeriodo.reduce((s,o)=>s+(o.saldo||0),0);
  const gastosTotal=gastos.reduce((s,g)=>s+(g.monto||0),0);
  const margen=totalIngresos-gastosTotal;

  // Ingresos por mes (últimos 12)
  const barData=React.useMemo(()=>{
    const hoy=new Date();
    return Array.from({length:12},(_,i)=>{
      const m=(hoy.getMonth()-11+i+12)%12;
      const y=hoy.getMonth()-11+i<0?hoy.getFullYear()-1:hoy.getFullYear();
      const v=pagadas.filter(o=>{
        const d=new Date(o.paidAt||o.createdAt||0);
        return d.getMonth()===m&&d.getFullYear()===y;
      }).reduce((s,o)=>s+(o.finalPrice||0),0);
      return{label:MESES_CORTO[m],v,active:i===11};
    });
  },[pagadas]);
  const maxBar=Math.max(...barData.map(d=>d.v),1);

  // Por tipo de servicio
  const porTipo=React.useMemo(()=>{
    const map={};
    ordenesPeriodo.forEach(o=>{
      const k=o.name||o.catalogId||"Otro";
      map[k]=(map[k]||0)+(o.finalPrice||0);
    });
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,6);
  },[ordenesPeriodo]);
  const totalTipo=porTipo.reduce((s,x)=>s+x[1],0)||1;
  const COLORES=["#0d9488","#2dd4bf","#f59e0b","#8b5cf6","#22c55e","#ef4444"];

  // Tabla detalle
  const ordenesOrdenadas=[...ordenesPeriodo].sort((a,b)=>
    new Date(b.paidAt||b.createdAt||0)-new Date(a.paidAt||a.createdAt||0)
  );

  const NavPeriodo=()=>(
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      {periodo==="mes"&&(
        <>
          <button onClick={()=>{
            if(mesIdx===0){setMesIdx(11);setAnio(a=>a-1);}
            else setMesIdx(m=>m-1);
          }} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:6,
            padding:"4px 10px",cursor:"pointer",color:"var(--text2)",fontSize:13}}>‹</button>
          <span style={{fontSize:12,fontWeight:600,color:"var(--text)",minWidth:110,textAlign:"center"}}>
            {MESES[mesIdx]} {anio}
          </span>
          <button onClick={()=>{
            if(mesIdx===11){setMesIdx(0);setAnio(a=>a+1);}
            else setMesIdx(m=>m+1);
          }} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:6,
            padding:"4px 10px",cursor:"pointer",color:"var(--text2)",fontSize:13}}>›</button>
        </>
      )}
      {periodo==="anio"&&(
        <>
          <button onClick={()=>setAnio(a=>a-1)} style={{background:"transparent",border:"1px solid var(--border)",
            borderRadius:6,padding:"4px 10px",cursor:"pointer",color:"var(--text2)",fontSize:13}}>‹</button>
          <span style={{fontSize:12,fontWeight:600,color:"var(--text)",minWidth:60,textAlign:"center"}}>{anio}</span>
          <button onClick={()=>setAnio(a=>a+1)} style={{background:"transparent",border:"1px solid var(--border)",
            borderRadius:6,padding:"4px 10px",cursor:"pointer",color:"var(--text2)",fontSize:13}}>›</button>
        </>
      )}
    </div>
  );

  return(
    <>
      {/* Selector de periodo */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:6}}>
          {["mes","anio","todo"].map(p=>(
            <button key={p} onClick={()=>setPeriodo(p)}
              style={{padding:"6px 16px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
                border:`1.5px solid ${periodo===p?"var(--teal)":"var(--border)"}`,
                background:periodo===p?"rgba(13,148,136,0.1)":"transparent",
                color:periodo===p?"var(--teal)":"var(--text2)"}}>
              {p==="mes"?"Por mes":p==="anio"?"Por año":"Todo"}
            </button>
          ))}
        </div>
        <NavPeriodo/>
      </div>

      {/* KPIs */}
      <div className="kpi-grid" style={{marginBottom:16}}>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#0d9488"}}/>
          <div className="kpi-label">Ingresos {periodo==="mes"?MESES[mesIdx]:periodo==="anio"?anio:"Totales"}</div>
          <div className="kpi-value">{fmtK(totalIngresos)}</div>
          <div className="kpi-sub up">↑ {ordenesPeriodo.length} servicios</div>
        </div>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#2dd4bf"}}/>
          <div className="kpi-label">Reservas cobradas</div>
          <div className="kpi-value">{fmtK(totalReservas)}</div>
          <div className="kpi-sub">pago inicial del cliente</div>
        </div>
        <div className="kpi">
          <div className="kpi-accent" style={{background:"#f59e0b"}}/>
          <div className="kpi-label">Saldos pendientes</div>
          <div className="kpi-value">{fmtK(totalSaldos)}</div>
          <div className="kpi-sub">cobrar al completar</div>
        </div>
        <div className="kpi">
          <div className="kpi-accent" style={{background:margen>=0?"#22c55e":"#ef4444"}}/>
          <div className="kpi-label">Margen neto</div>
          <div className="kpi-value">{fmtK(margen)}</div>
          <div className={`kpi-sub ${margen>=0?"up":"down"}`}>
            {totalIngresos>0?`${Math.round(margen/totalIngresos*100)}% margen`:"vs gastos totales"}
          </div>
        </div>
      </div>

      <div className="grid-2" style={{marginBottom:16}}>
        {/* Gráfico barras 12 meses */}
        <div className="card">
          <div className="card-title">Ingresos últimos 12 meses</div>
          <div className="bar-chart">
            {barData.map((d,i)=>(
              <div className="bar-col" key={i}>
                <div className="bar-val">{d.v>0?fmtK(d.v):""}</div>
                <div className="bar-fill" style={{
                  height:`${Math.max((d.v/maxBar)*85,d.v>0?6:3)}px`,
                  background:d.active
                    ?"linear-gradient(to top,#0d9488,#2dd4bf)"
                    :"rgba(45,212,191,0.2)"
                }}/>
                <div className="bar-month">{d.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Distribución por tipo */}
        <div className="card">
          <div className="card-title">Por tipo de servicio</div>
          {porTipo.length===0?(
            <div style={{color:"var(--text3)",fontSize:12,textAlign:"center",padding:20}}>Sin datos en este periodo</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {porTipo.map(([nombre,monto],i)=>(
                <div key={i}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,color:"var(--text2)",display:"flex",alignItems:"center",gap:6}}>
                      <span style={{width:8,height:8,borderRadius:2,background:COLORES[i],display:"inline-block"}}/>
                      {nombre}
                    </span>
                    <span style={{fontSize:11,fontWeight:700,color:"var(--text)",fontFamily:"DM Mono,monospace"}}>
                      {fmt(monto)}
                    </span>
                  </div>
                  <div style={{height:4,background:"var(--bg2)",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,background:COLORES[i],
                      width:`${(monto/totalTipo)*100}%`,transition:"width 0.5s"}}/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Tabla detalle */}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid var(--border)",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:1.5,
            textTransform:"uppercase",color:"var(--text2)"}}>
            Detalle de cobros
          </span>
          <span style={{fontSize:11,color:"var(--text3)"}}>
            {ordenesOrdenadas.length} transacciones · {fmt(totalIngresos)} total
          </span>
        </div>
        {ordenesOrdenadas.length===0?(
          <div style={{padding:40,textAlign:"center",color:"var(--text3)",fontSize:13}}>
            Sin ingresos en este periodo
          </div>
        ):(
          <table className="data-table">
            <thead>
              <tr>
                <th>Fecha pago</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Reserva</th>
                <th>Saldo</th>
                <th>Total</th>
                <th>Descuento</th>
              </tr>
            </thead>
            <tbody>
              {ordenesOrdenadas.map(o=>{
                const d=new Date(o.paidAt||o.createdAt||0);
                const fechaStr=isNaN(d)?"—":d.toLocaleDateString("es-CL",{day:"2-digit",month:"short",year:"numeric"});
                return(
                  <tr key={o.id}>
                    <td>
                      <div style={{fontSize:11,fontFamily:"DM Mono,monospace",color:"var(--text)"}}>{fechaStr}</div>
                      <div style={{fontSize:9,color:"var(--text3)"}}>{o.time||""}</div>
                    </td>
                    <td>
                      <div style={{fontSize:12,fontWeight:500,color:"var(--text)"}}>{o.clientName||"—"}</div>
                      <div style={{fontSize:10,color:"var(--text3)"}}>{o.city||""}</div>
                    </td>
                    <td>
                      <div style={{fontSize:11,color:"var(--text2)"}}>{o.name||o.catalogId||"—"}</div>
                      <div style={{fontSize:9,color:"var(--text3)"}}>{o.category==="plan"?"Plan":"Servicio"}</div>
                    </td>
                    <td style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--text2)"}}>
                      {fmt(o.reserva||0)}
                    </td>
                    <td style={{fontFamily:"DM Mono,monospace",fontSize:11,color:"var(--text2)"}}>
                      {fmt(o.saldo||0)}
                    </td>
                    <td style={{fontFamily:"DM Mono,monospace",fontSize:12,fontWeight:700,color:"var(--teal)"}}>
                      {fmt(o.finalPrice||0)}
                    </td>
                    <td>
                      {o.discount
                        ? <span style={{fontSize:9,color:"#d97706",fontWeight:600}}>🏷 {o.discount.label||"Dcto"}</span>
                        : <span style={{color:"var(--text3)",fontSize:10}}>—</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}
